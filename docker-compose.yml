services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mras
      POSTGRES_USER: mras
      POSTGRES_PASSWORD: mras
    ports:
      - "5432:5432"
    volumes:
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mras"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.6
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # Shared cooldown store (T1): transient flags only, every key TTL'd — no
  # volume on purpose; losing it costs at most one repeated ad per person.
  # Durable play history (dashboard/billing/proof) lives in postgres `events`.
  # Port published to the host so NATIVE vision (macOS camera path) reaches it.
  redis:
    image: redis:7-alpine
    ports:
      # Loopback-only: native vision needs localhost, and an unauthenticated
      # Redis must not be reachable from venue Wi-Fi.
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mras-vision:
    profiles: ["docker-vision"]  # excluded from default 'docker compose up'; run natively on macOS (no camera passthrough in Docker)
    build: ../mras-vision
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://mras:mras@postgres:5432/mras
      QDRANT_URL: http://qdrant:6333
      COMPOSER_URL: http://mras-composer:8002
      DEEPFACE_BACKEND: ${DEEPFACE_BACKEND:-cpu}
      FRAME_SAMPLE_RATE: ${FRAME_SAMPLE_RATE:-5}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.68}
      SCREEN_ID: ${SCREEN_ID:-screen_0}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      # service_started (not healthy) is enough: the resolver falls back to
      # its in-memory cooldown whenever Redis is unreachable.
      redis:
        condition: service_started
    command: uvicorn main:app --host 0.0.0.0 --port 8001

  # Warm Remotion render sidecar: composer POSTs overlay props, gets a transparent .mov.
  # A compose service (not a separate manual process) so `docker compose up`/Ctrl-C and
  # `docker compose down` start/stop it with the rest; SIGTERM closes Chromium cleanly.
  mras-overlays:
    build: ../mras-overlays
    expose:
      - "3000"
    init: true  # tini reaps Chromium child processes and forwards SIGTERM to Node
    stop_grace_period: 20s
    volumes:
      - custom_components:/app/src/custom  # sidecar writes <slug>.tsx + registry.ts here; survives restarts
    healthcheck:
      # Node 22 has global fetch; reports "warm" once the bundle + Chromium are ready.
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  mras-composer:
    build: ../mras-composer
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://mras:mras@postgres:5432/mras
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      ELEVENLABS_VOICE_ID: ${ELEVENLABS_VOICE_ID}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_VOICE: ${GEMINI_VOICE:-Kore}
      ASSETS_DIR: /assets
      ASSEMBLED_OUTPUT_DIR: /output
      STANDARD_VIDEO_PATH: /assets/standard.mp4
      FFMPEG_TIMEOUT: ${FFMPEG_TIMEOUT:-10}
      OVERLAY_SIDECAR_URL: http://mras-overlays:3000
      # OVERLAY_TEMPLATE defaults to "{name}" in the app (compose ${} can't default a value with braces).
      OVERLAY_PRESET: ${OVERLAY_PRESET:-turbulence-warp}
      OVERLAY_START_MS: ${OVERLAY_START_MS:-500}
      OVERLAY_DURATION_MS: ${OVERLAY_DURATION_MS:-2000}
      # Overlay window as a fraction of the base clip (code default 0.5 =
      # half the video). This demo rig runs full-length name overlays.
      OVERLAY_DURATION_FRACTION: ${OVERLAY_DURATION_FRACTION:-1.0}
      OVERLAY_COLOR: "${OVERLAY_COLOR:-#ffffff}"
      OVERLAY_POSITION: ${OVERLAY_POSITION:-top}
    volumes:
      - ./assets:/assets:ro
      # Bind-mount so generated/preview clips land in a real host folder
      # (/Users/jn/code/mras-ops/output) you can open in Finder — not a hidden Docker volume.
      - ./output:/output
    depends_on:
      postgres:
        condition: service_healthy
      # Not blocking on `service_healthy` (warm-up is slow); the composer falls back to a
      # no-overlay clip if the sidecar isn't ready yet.
      mras-overlays:
        condition: service_started

  mras-ops-api:
    build: ./api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://mras:mras@postgres:5432/mras
      OVERLAY_SIDECAR_URL: http://mras-overlays:3000
    depends_on:
      postgres:
        condition: service_healthy
      mras-overlays:
        condition: service_started

  mras-ops-frontend:
    # Frontend reaches ops-api (8080) and composer (8002) from the BROWSER via host-published ports.
    # api.ts defaults to http://localhost:8080 / http://localhost:8002 — correct for local demo.
    # For a non-localhost deploy, pass VITE_OPS_API_URL and VITE_COMPOSER_URL as Docker build-args.
    build: ./frontend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  qdrant_data:
  custom_components:
